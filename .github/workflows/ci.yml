name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: jobs only read the checkout.
permissions:
  contents: read

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install mypy
      - name: Ruff lint
        run: ruff check novavision tests scripts server.py app.py
      - name: Ruff format check
        run: ruff format --check novavision tests scripts server.py app.py
      - name: mypy
        run: mypy novavision  # flags live in [tool.mypy], shared with local runs

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-cov
      - name: Run tests with coverage
        run: pytest -q --cov=novavision --cov-report=term-missing --cov-report=xml --cov-fail-under=80
      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml

  server-smoke:
    name: Server smoke (real socket, no models)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Boot the server and exercise the hardened surface
        run: bash scripts/smoke_server.sh

  ml-smoke:
    name: ML import + null-path smoke
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ml + research deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[ml,research]"
      - name: Import the real generation/eval stack
        run: |
          python -c "from novavision.generation.diffusers_backend import DiffusersBackend; \
                     from novavision.eval.probes import CLIPProbe; \
                     from novavision.affect.analyzer import EmotionAnalyzer; print('imports ok')"
      - name: Null-backend experiment smoke
        run: |
          python - <<'PY'
          from unittest.mock import patch
          from novavision.eval.probes import Recovery
          from novavision.taxonomy import EMOTIONS
          import novavision.experiments.run as run

          class FakeProbe:
              name = "clip:ci"
              def __init__(self, *a, **k): pass
              def recover(self, image): return Recovery("joy", 0.1, 0.5, {e: 0.0 for e in EMOTIONS})
              def clip_t(self, image, text): return 0.2

          with patch.object(run, "CLIPProbe", FakeProbe):
              run.run_experiment(backend="null", contents=1, seeds=1, out="results/ci")
          print("experiment smoke ok")
          PY

  security:
    name: Security audit (secrets + deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # full history so the secret scan covers every commit
      - name: Scan history for committed secrets
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
      - name: Audit the locked reproduction environment
        run: pip-audit --desc -r requirements.lock
        continue-on-error: true  # advisory-only rollout; remove this line to make CVEs block the build
